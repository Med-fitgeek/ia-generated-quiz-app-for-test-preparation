<div class="container" >
  <app-dashboard-header
  [userName]="userName"
  (newQuiz)="newQuiz()">
</app-dashboard-header>

<app-stats-grid
  [totalQuizzes]="totalQuizzes"
  [totalSessions]="totalSessions"
  [averageScore]="averageScore"
/>

<app-sessions-card
  [sessions]="sessions"
  (goToReview)="goToReview($event)"
/>

<app-quiz-grid
  [quizzes]="quizzes"
  (startSession)="startSession($event)"
  (deleteQuiz)="deleteQuiz($event)"
/>
</div>
