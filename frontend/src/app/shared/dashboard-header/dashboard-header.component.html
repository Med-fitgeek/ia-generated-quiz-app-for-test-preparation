<div class="dashboard-header">

  <div class="header-title">
    <h2>Dashboard</h2>
    <p class="muted">Bienvenue, {{ userName }} 👋</p>
  </div>

  <div class="header-actions">
    <button class="btn btn-primary" (click)="onNewQuiz()">
      + Nouveau Quiz
    </button>
    <a routerLink="/dashboard/account" class="profile-badge" [style.background]="avatar.gradient">
      {{ avatar.emoji }}
    </a>
  </div>

</div>
