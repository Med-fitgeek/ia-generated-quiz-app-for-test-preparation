<div class="list-page">

  <div class="list-header">
    <div class="list-header-left">
      <a routerLink="/dashboard" class="back-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Dashboard
      </a>
      <div>
        <h2>Tous les quiz</h2>
        <p class="list-sub">{{ totalElements }} quiz au total</p>
      </div>
    </div>
    <button class="btn btn-primary" (click)="newQuiz()">+ Nouveau Quiz</button>
  </div>

  <div class="loader-wrap" *ngIf="loading">
    <div class="loader-spinner"></div>
  </div>

  <div class="empty-state" *ngIf="!loading && quizzes.length === 0">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
         stroke-linecap="round" stroke-linejoin="round" width="40" height="40">
      <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
      <rect x="9" y="3" width="6" height="4" rx="2"/>
    </svg>
    <p>Aucun quiz créé pour le moment</p>
    <button class="btn btn-primary" (click)="newQuiz()">Créer mon premier quiz</button>
  </div>

  <div class="quiz-grid" *ngIf="!loading && quizzes.length > 0">
    <div class="quiz-tile" *ngFor="let quiz of quizzes">

      <div class="quiz-tile-header">
        <h3>{{ quiz.title }}</h3>
        <span class="quiz-date">{{ quiz.generatedAt | date:'dd/MM/yy' }}</span>
      </div>

      <div class="quiz-meta">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" width="13" height="13">
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
        {{ quiz.sessionsCount }} session{{ quiz.sessionsCount !== 1 ? 's' : '' }}
      </div>

      <div class="quiz-actions">
        <button class="btn btn-secondary" (click)="startSession(quiz.quizId)">Nouvelle session</button>
        <button class="btn-icon btn-delete" (click)="deleteQuiz(quiz.quizId)" title="Supprimer">
          <lucide-icon [name]="TrashIcon" size="18"></lucide-icon>
        </button>
      </div>

    </div>
  </div>

  <div class="pagination" *ngIf="totalPages > 1">
    <button class="page-btn" (click)="goToPage(currentPage - 1)" [disabled]="currentPage === 0">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
        <path d="M15 18l-6-6 6-6"/>
      </svg>
    </button>
    <button class="page-btn"
      *ngFor="let p of pageNumbers"
      [class.active]="p === currentPage"
      (click)="goToPage(p)">
      {{ p + 1 }}
    </button>
    <button class="page-btn" (click)="goToPage(currentPage + 1)" [disabled]="currentPage === totalPages - 1">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
        <path d="M9 18l6-6-6-6"/>
      </svg>
    </button>
  </div>

</div>
