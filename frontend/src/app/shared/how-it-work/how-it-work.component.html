<section class="how">

  <div class="header">

    <div class="badge">
      Comment ça marche
    </div>

    <h2>
      Comment ça marche
    </h2>

    <p>
      Générez votre contenu pédagogique en 4 étapes simples
    </p>

  </div>


  <div class="steps">

    <div class="line"></div>

    <div class="step" *ngFor="let step of steps">

      <div class="icon-container">

        <lucide-icon
          [name]="step.icon"
          size="32">
        </lucide-icon>

        <span class="number">
          {{step.step}}
        </span>

      </div>

      <h3>
        {{step.title}}
      </h3>

      <p>
        {{step.description}}
      </p>

    </div>

  </div>

</section>
