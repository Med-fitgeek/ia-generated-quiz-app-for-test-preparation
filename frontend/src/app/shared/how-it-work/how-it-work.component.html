<section class="how">

  <div class="how-header">

    <div class="badge">Comment ça marche</div>

    <h2>Générez votre quiz en <span class="gradient-text">4 étapes</span></h2>

    <p>Simple, rapide et efficace — de l'import à l'analyse en quelques secondes</p>

  </div>

  <div class="steps-wrapper">

    <!-- Connecting line (desktop) -->
    <div class="connector-line"></div>

    <div class="steps">

      <div class="step" *ngFor="let step of steps; let last = last">

        <div class="step-icon-wrap">

          <div class="step-ring"></div>

          <div class="icon-container">
            <lucide-icon [name]="step.icon" size="28"></lucide-icon>
          </div>

          <span class="step-number">{{ step.step }}</span>

        </div>

        <div class="step-body">
          <h3>{{ step.title }}</h3>
          <p>{{ step.description }}</p>
        </div>

        <!-- Arrow between steps (desktop) -->
        <div class="step-arrow" *ngIf="!last">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </div>

      </div>

    </div>

  </div>

</section>
