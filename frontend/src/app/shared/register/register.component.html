<div class="auth-page">

  <div class="auth-blob auth-blob-1"></div>
  <div class="auth-blob auth-blob-2"></div>

  <div class="auth-card">

    <!-- Brand -->
    <div class="auth-brand">
      <a routerLink="/">
        <img src="assets/img/b-ready.png" alt="B-Ready" class="auth-logo">
      </a>
    </div>

    <!-- Header -->
    <div class="auth-header">
      <h1>Créer un compte ✨</h1>
      <p>Rejoins la plateforme et commence à générer tes quiz.</p>
    </div>

    <!-- Error -->
    <div *ngIf="errorMessage" class="auth-alert alert-error">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" width="15" height="15">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      {{ errorMessage }}
    </div>

    <!-- Success -->
    <div *ngIf="successMessage" class="auth-alert alert-success">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" width="15" height="15">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
      {{ successMessage }}
    </div>

    <!-- Form -->
    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="auth-form">

      <div class="form-group">
        <label for="username">Nom d'utilisateur</label>
        <input
          id="username"
          type="text"
          formControlName="username"
          placeholder="ex : johndoe"
          [class.invalid]="registerForm.get('username')?.invalid && registerForm.get('username')?.touched"
        />
        <span class="field-error"
              *ngIf="registerForm.get('username')?.invalid && registerForm.get('username')?.touched">
          Minimum 3 caractères
        </span>
      </div>

      <div class="form-group">
        <label for="email">Adresse email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="votre@email.com"
          [class.invalid]="registerForm.get('email')?.invalid && registerForm.get('email')?.touched"
        />
        <span class="field-error"
              *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
          Email invalide
        </span>
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <div class="password-wrap">
          <input
            id="password"
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="Minimum 6 caractères"
            [class.invalid]="registerForm.get('password')?.invalid && registerForm.get('password')?.touched"
          />
          <button type="button" class="eye-btn" (click)="showPassword = !showPassword" tabindex="-1">
            <svg *ngIf="!showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg *ngIf="showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
              <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
        <span class="field-error"
              *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
          Minimum 6 caractères
        </span>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmer le mot de passe</label>
        <div class="password-wrap">
          <input
            id="confirmPassword"
            [type]="showConfirm ? 'text' : 'password'"
            formControlName="confirmPassword"
            placeholder="••••••••"
            [class.invalid]="registerForm.get('confirmPassword')?.invalid && registerForm.get('confirmPassword')?.touched"
          />
          <button type="button" class="eye-btn" (click)="showConfirm = !showConfirm" tabindex="-1">
            <svg *ngIf="!showConfirm" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg *ngIf="showConfirm" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
              <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Password strength -->
      <div class="password-strength" *ngIf="registerForm.get('password')?.value">
        <div class="strength-bars">
          <span class="bar" [class.active]="passwordStrength >= 1" [class.weak]="passwordStrength === 1" [class.medium]="passwordStrength === 2" [class.strong]="passwordStrength >= 3"></span>
          <span class="bar" [class.active]="passwordStrength >= 2" [class.medium]="passwordStrength === 2" [class.strong]="passwordStrength >= 3"></span>
          <span class="bar" [class.active]="passwordStrength >= 3" [class.strong]="passwordStrength >= 3"></span>
        </div>
        <span class="strength-label">{{ strengthLabel }}</span>
      </div>

      <button class="btn btn-primary auth-submit" type="submit" [disabled]="loading">
        <div class="btn-spinner" *ngIf="loading"></div>
        <span>{{ loading ? 'Création...' : 'Créer mon compte' }}</span>
        <svg *ngIf="!loading" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </button>

    </form>

    <p class="auth-switch">
      Déjà inscrit ?
      <a routerLink="/login" class="auth-link">Se connecter</a>
    </p>

  </div>
</div>
