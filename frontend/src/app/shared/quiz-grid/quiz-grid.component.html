<div class="quiz-section">

  <div class="quiz-section-header">
    <div>
      <h3>Mes quiz</h3>
      <p class="quiz-sub" *ngIf="totalCount > quizzes.length">
        {{ quizzes.length }} sur {{ totalCount }} quiz
      </p>
    </div>
    <button class="see-all-btn" *ngIf="totalCount > quizzes.length" (click)="onSeeAll()">
      Voir tout
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </button>
  </div>

  <div *ngIf="quizzes.length === 0" class="empty-state">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
         stroke-linecap="round" stroke-linejoin="round" width="32" height="32">
      <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
      <rect x="9" y="3" width="6" height="4" rx="2"/>
    </svg>
    <p>Aucun quiz créé pour le moment</p>
  </div>

  <div class="quiz-grid">
    <div class="quiz-tile" *ngFor="let quiz of quizzes">

      <div class="quiz-tile-header">
        <h3>{{ quiz.title }}</h3>
        <span class="quiz-date">{{ quiz.generatedAt | date:'dd/MM/yy' }}</span>
      </div>

      <div class="quiz-meta">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" width="13" height="13">
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
        {{ quiz.sessionsCount }} session{{ quiz.sessionsCount !== 1 ? 's' : '' }}
      </div>

      <div class="quiz-actions">
        <button class="btn btn-secondary" (click)="onStartSession(quiz.quizId)">
          Nouvelle session
        </button>
        <button class="btn-icon btn-delete" (click)="onDeleteQuiz(quiz.quizId)" title="Supprimer">
          <lucide-icon [name]="TrashIcon" size="18"></lucide-icon>
        </button>
      </div>

    </div>
  </div>

  <div class="quiz-footer" *ngIf="totalCount > quizzes.length">
    <button class="see-all-full" (click)="onSeeAll()">
      Voir tous les quiz ({{ totalCount }})
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </button>
  </div>

</div>
