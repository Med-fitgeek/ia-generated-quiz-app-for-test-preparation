<div class="list-page">

  <div class="list-header">
    <div class="list-header-left">
      <a routerLink="/dashboard" class="back-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Dashboard
      </a>
      <div>
        <h2>Toutes les sessions</h2>
        <p class="list-sub">{{ totalElements }} session{{ totalElements !== 1 ? 's' : '' }} au total</p>
      </div>
    </div>
  </div>

  <!-- Loading -->
  <div class="loader-wrap" *ngIf="loading">
    <div class="loader-spinner"></div>
  </div>

  <!-- Empty -->
  <div class="empty-state" *ngIf="!loading && sessions.length === 0">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
         stroke-linecap="round" stroke-linejoin="round" width="40" height="40">
      <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
    </svg>
    <p>Aucune session pour le moment</p>
  </div>

  <!-- List -->
  <div class="sessions-list" *ngIf="!loading && sessions.length > 0">
    <div class="session-item" *ngFor="let session of sessions">
      <div class="session-info">
        <span class="session-id">Session #{{ session.id }}</span>
      </div>
      <div class="session-score"
           [ngClass]="{'good': session.rate >= 80, 'medium': session.rate >= 50 && session.rate < 80, 'bad': session.rate < 50}">
        {{ session.rate }}%
      </div>
      <button class="review-btn" (click)="goToReview(session.id)">Rapport</button>
    </div>
  </div>

  <!-- Pagination -->
  <div class="pagination" *ngIf="totalPages > 1">
    <button class="page-btn" (click)="goToPage(currentPage - 1)" [disabled]="currentPage === 0">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
        <path d="M15 18l-6-6 6-6"/>
      </svg>
    </button>

    <button class="page-btn"
      *ngFor="let p of pageNumbers"
      [class.active]="p === currentPage"
      (click)="goToPage(p)">
      {{ p + 1 }}
    </button>

    <button class="page-btn" (click)="goToPage(currentPage + 1)" [disabled]="currentPage === totalPages - 1">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
        <path d="M9 18l6-6-6-6"/>
      </svg>
    </button>
  </div>

</div>
