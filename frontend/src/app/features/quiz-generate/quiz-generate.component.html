<div class="generate-page">

  <!-- Blobs -->
  <div class="gen-blob gen-blob-1"></div>
  <div class="gen-blob gen-blob-2"></div>

  <div class="generate-card">

    <!-- Header -->
    <div class="gen-header">
      <div class="gen-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
        </svg>
      </div>
      <div>
        <h1>Générer un quiz</h1>
        <p class="gen-sub">Configurez les paramètres et lancez la génération par IA</p>
      </div>
    </div>

    <!-- Error -->
    <div *ngIf="error" class="gen-error">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" width="15" height="15">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      {{ error }}
    </div>

    <!-- Loading overlay -->
    <div class="gen-loading" *ngIf="loading">
      <div class="loading-spinner"></div>
      <p class="loading-label">Génération en cours<span class="dots"></span></p>
      <p class="loading-sub">L'IA analyse votre contenu et crée les questions</p>
    </div>

    <!-- Form -->
    <div class="gen-form" [class.hidden]="loading">

      <!-- Title -->
      <div class="form-group">
        <label for="title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
            <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
          Titre du quiz
        </label>
        <input
          id="title"
          type="text"
          [(ngModel)]="title"
          placeholder="Ex : Révisions Biologie cellulaire"
          [disabled]="loading"
        />
      </div>

      <!-- Number of questions -->
      <div class="form-group">
        <label for="nbQuestions">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
            <circle cx="12" cy="12" r="10"/>
            <path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3M12 17h.01"/>
          </svg>
          Nombre de questions
          <span class="label-hint">Entre 1 et 12</span>
        </label>
        <div class="number-input-wrap">
          <button class="number-btn" (click)="decrement()" [disabled]="numberOfQuestions <= 1 || loading">−</button>
          <input
            id="nbQuestions"
            type="number"
            min="1"
            max="12"
            [(ngModel)]="numberOfQuestions"
            [disabled]="loading"
          />
          <button class="number-btn" (click)="increment()" [disabled]="numberOfQuestions >= 12 || loading">+</button>
        </div>
      </div>

      <!-- Difficulty -->
      <div class="form-group">
        <label>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
          Difficulté
        </label>
        <div class="difficulty-selector">
          <button
            class="diff-btn diff-easy"
            [class.active]="difficulty === 'EASY'"
            (click)="difficulty = 'EASY'"
            [disabled]="loading"
          >
            <span class="diff-dot"></span>
            Facile
          </button>
          <button
            class="diff-btn diff-moderate"
            [class.active]="difficulty === 'MODERATE'"
            (click)="difficulty = 'MODERATE'"
            [disabled]="loading"
          >
            <span class="diff-dot"></span>
            Modéré
          </button>
          <button
            class="diff-btn diff-hard"
            [class.active]="difficulty === 'HARD'"
            (click)="difficulty = 'HARD'"
            [disabled]="loading"
          >
            <span class="diff-dot"></span>
            Difficile
          </button>
        </div>
      </div>

      <!-- Actions -->
      <div class="gen-actions">
        <button class="btn btn-secondary" (click)="router.navigate(['/source'])" [disabled]="loading">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" width="15" height="15">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
          Retour
        </button>
        <button class="btn btn-primary gen-submit" (click)="submit()" [disabled]="loading">
          Générer le quiz
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" width="15" height="15">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
          </svg>
        </button>
      </div>

    </div>

  </div>
</div>
