<div class="container">
  <h1>Quiz Preview</h1>

  <div *ngIf="error" class="alert alert-error">
    {{ error }}
  </div>

  <div *ngIf="quiz" class="flex-col gap-5">
    <div
      class="card"
      *ngFor="let q of quiz.generatedQuestions; let i = index; trackBy: trackByIndex"
    >
      <h3>Question {{ i + 1 }}</h3>

      <p><strong>Statement:</strong> {{ q.statement }}</p>

      <div class="flex-col gap-2" style="margin-top: 12px;">
        <strong>Choices:</strong>
        <ul>
          <li
            *ngFor="let choice of q.choices; let idx = index"
            [style.color]="idx === q.correctIndex ? 'var(--color-success)' : 'inherit'"
          >
            {{ choice }}
            <span *ngIf="idx === q.correctIndex"> (correct)</span>
          </li>
        </ul>
      </div>

      <div style="margin-top: 12px;">
        <p><strong>Explanation:</strong></p>
        <p>{{ q.explanation }}</p>
      </div>

      <div style="margin-top: 12px;">
        <p><strong>Source quote:</strong></p>
        <blockquote style="color: var(--color-text-muted); border-left: 3px solid var(--color-border); padding-left: 12px;">
          {{ q.sourceQuote }}
        </blockquote>
      </div>
    </div>

    <div class="flex gap-3">
      <button class="btn-secondary" (click)="router.navigate(['/knowledge'])">
        New knowledge source
      </button>
      <button class="btn-primary" (click)="router.navigate(['/knowledge'])">
        Generate another quiz
      </button>
    </div>
  </div>
</div>
