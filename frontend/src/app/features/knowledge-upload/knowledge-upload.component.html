<div class="container source-container">
  <h1>Import Knowledge Source</h1>
  <p>Upload a document or provide structured text to generate quizzes.</p>

  <div class="source-btn-container flex gap-3" style="margin-bottom: 16px;">
    <button
      class="btn btn-secondary"
      [class.btn-primary]="mode === 'file'"
      (click)="setMode('file')"
    >
      File
    </button>
    <button
      class="btn btn-secondary"
      [class.btn-primary]="mode === 'text'"
      (click)="setMode('text')"
    >
      Structured Text
    </button>
  </div>

  <div class="card">
    <!-- Error -->
    <div *ngIf="error" class="alert alert-error">
      {{ error }}
    </div>

    <!-- File mode -->
    <div *ngIf="mode === 'file'" class="flex-col gap-4">
      <div class="flex-col gap-2">
        <label>Select document (pdf, docx, csv)</label>
        <input type="file" (change)="onFileSelected($event)" />
        <p *ngIf="selectedFile">Selected: {{ selectedFile.name }}</p>
      </div>
    </div>

    <!-- Text mode -->
    <div *ngIf="mode === 'text'" class="flex-col gap-4">
      <div class="flex-col gap-2">
        <label>Subject *</label>
        <input [(ngModel)]="textDto.subject" placeholder="e.g. Spring Security basics" />
      </div>

      <div class="flex-col gap-2">
        <label>Key concepts</label>
        <textarea [(ngModel)]="textDto.keyConcepts" placeholder="JWT, Filters, Authentication..."></textarea>
      </div>

      <div class="flex-col gap-2">
        <label>Objectives *</label>
        <textarea [(ngModel)]="textDto.objectives" placeholder="What the learner should master..."></textarea>
      </div>

      <div class="flex-col gap-2">
        <label>Additional notes</label>
        <textarea [(ngModel)]="textDto.additionalNotes" placeholder="Optional context..."></textarea>
      </div>
    </div>

    <div style="margin-top: 24px;">
      <button class="btn btn-primary" (click)="submit()" [disabled]="loading">
        {{ loading ? 'Uploading...' : 'Suivant' }}
      </button>
    </div>

    <div *ngIf="loading" class="loader"></div>
  </div>
</div>
