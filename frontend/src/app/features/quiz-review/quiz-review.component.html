<div class="container" *ngIf="!loading">

  <h1>Quiz Review</h1>

  <div class="score">
    Score: {{review.rate}}%
  </div>

  <!-- AI Recommendation -->

  <div class="ai-report" *ngIf="report">
    <h2>AI Recommendation</h2>
    <p>{{report.recommendations}}</p>
  </div>

  <!-- Questions -->

  <div *ngFor="let q of review.questions; let i = index" class="question-card">

    <h3>Question {{i + 1}}</h3>

    <p>{{q.statement}}</p>

    <ul>

      <li
        *ngFor="let choice of q.choices; let idx = index"
        [class.correct]="idx === q.correctIndex"
        [class.user]="idx === q.userAnswer"
      >

        {{choice}}

      </li>

    </ul>

    <div class="explanation">
      <strong>Explanation:</strong>
      {{q.explanation}}
    </div>

  </div>

</div>
