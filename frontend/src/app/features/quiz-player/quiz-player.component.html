<div class="container card-section" *ngIf="!showResult">

  <div class="card">

    <h2 class="text-accent">
      Question {{ currentIndex + 1 }} / {{ quiz.generatedQuestions.length }}
    </h2>

    <p style="font-size: 1.2rem; margin-bottom: 24px;">
      {{ currentQuestion.statement }}
    </p>

    <div class="flex-col gap-3">

      <button
        class="btn btn-secondary"
        *ngFor="let choice of currentQuestion.choices; let i = index"
        (click)="selectAnswer(i)"
        [ngStyle]="{
          'border-color': isSelected(i) ? 'var(--color-primary)' : '',
          'box-shadow': isSelected(i) ? 'var(--shadow-glow)' : ''
        }"
      >
        {{ choice }}
      </button>

    </div>

    <div class="flex-between" style="margin-top: 32px;">

      <button
        class="btn btn-secondary"
        (click)="previous()"
        [disabled]="currentIndex === 0"
      >
        Précédent
      </button>

      <button
        class="btn btn-primary"
        *ngIf="!isLastQuestion()"
        (click)="next()"
        [disabled]="selectedAnswers[currentIndex] === null"
      >
        Suivant
      </button>

      <button
        class="btn btn-primary"
        *ngIf="isLastQuestion()"
        (click)="finish()"
        [disabled]="selectedAnswers[currentIndex] === null"
      >
        Terminer le quiz
      </button>

    </div>

  </div>
</div>

<!-- Écran de fin -->
<div class="container card-section" *ngIf="showResult">

  <div class="card">
    <h1 class="text-accent">Quiz terminé 🎉</h1>
    <p>Merci d’avoir complété le quiz.</p>

    <p class="muted">
      Tes réponses vont être envoyées pour analyse et génération du rapport.
    </p>

    <button class="btn btn-primary" style="margin-top: 24px;">
      Voir mon rapport
    </button>
  </div>

</div>
